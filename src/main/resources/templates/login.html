<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VG - Login</title>
    <link rel="stylesheet" th:href="@{/css/form.css}">
</head>
<body>
<main class="auth-page">
    <section class="form-section">
        <h2>Login</h2>
        <form method="post" th:action="@{/login-request}">
            <div class="form-field">
                <label for="email-field">Email</label>
                <input id="email-field" type="email" name="email" required>
            </div>

            <div class="form-field">
                <label for="password-field">Password</label>
                <input id="password-field" type="password" name="password" required>
            </div>

            <button class="btn btn-primary btn-full" type="submit">Sign in</button>
        </form>
        <p class="form-link">Don't have an account? <a th:href="@{/auth/register}">Register!</a></p>
    </section>
</main>
</body>
</html>
